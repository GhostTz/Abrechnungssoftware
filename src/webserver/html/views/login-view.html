<section class="view-card">
    <h1>login-view</h1>
    <p>Einzige Public-Ansicht ohne Navbar und Footer.</p>
    <form class="form-grid" novalidate>
        <label class="form-field" for="email">
            <span>E-Mail</span>
            <input id="email" type="email" placeholder="name@firma.de" required>
        </label>

        <label class="form-field" for="password">
            <span>Passwort</span>
            <input id="password" type="password" minlength="8" placeholder="Mindestens 8 Zeichen" required>
        </label>

        <p class="helper-text">Demo-Login: Alle Zugangsdaten werden akzeptiert.</p>
        <button class="btn-primary" type="submit">Login</button>
    </form>
</section>
